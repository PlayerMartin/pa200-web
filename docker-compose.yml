services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"   # must meet complexity requirements
      MSSQL_DB: string_db
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  app:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=Server=db,1433;Database=string_db;User Id=sa;Password=Password123!;Encrypt=true;TrustServerCertificate=true;
    depends_on:
      - db

volumes:
  mssql_data: